services:
  skedi:
    build: .
    container_name: s50ttt-skedi
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "${BIND_IP:-0.0.0.0}:${PORT:-8023}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
