name: s50ttt-skedi-alpha

services:
  skedi-alpha:
    build: .
    container_name: s50ttt-skedi-alpha
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    read_only: true
    init: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    tmpfs:
      - /tmp:size=32m,mode=1777
    env_file: .env.alpha
    environment:
      RELEASE_CHANNEL: alpha
      BACKUP_DIR: /app/backups
      BACKUP_AUTO_RETENTION: 30
      BACKUP_MANUAL_RETENTION: 10
      BACKUP_SAFETY_RETENTION: 10
      OFFSITE_BACKUP_ENABLED: "${OFFSITE_BACKUP_ENABLED:-0}"
      OFFSITE_BACKUP_DIR: /app/offsite-backups
      OFFSITE_BACKUP_RETENTION: 90
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-0}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-s50ttt_alpha_session}"
      SESSION_HOURS: "${SESSION_HOURS:-12}"
      SESSION_ABSOLUTE_HOURS: "${SESSION_ABSOLUTE_HOURS:-24}"
      TRUST_PROXY: 0
      TRUSTED_HOSTS: "${TRUSTED_HOSTS:-}"
    volumes:
      - ./data-alpha:/app/data
      - ./backups-alpha:/app/backups
      - "${OFFSITE_HOST_PATH:-./backups-alpha-offsite}:/app/offsite-backups"
    ports:
      - "${BIND_IP:-0.0.0.0}:${ALPHA_PORT:-8024}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  backup-alpha:
    build: .
    container_name: s50ttt-skedi-alpha-backup
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    read_only: true
    init: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    tmpfs:
      - /tmp:size=16m,mode=1777
    env_file: .env.alpha
    environment:
      RELEASE_CHANNEL: alpha
      BACKUP_DIR: /app/backups
      BACKUP_AUTO_RETENTION: 30
      BACKUP_MANUAL_RETENTION: 10
      BACKUP_SAFETY_RETENTION: 10
      BACKUP_INTERVAL_SECONDS: 86400
      OFFSITE_BACKUP_ENABLED: "${OFFSITE_BACKUP_ENABLED:-0}"
      OFFSITE_BACKUP_DIR: /app/offsite-backups
      OFFSITE_BACKUP_RETENTION: 90
    volumes:
      - ./data-alpha:/app/data
      - ./backups-alpha:/app/backups
      - "${OFFSITE_HOST_PATH:-./backups-alpha-offsite}:/app/offsite-backups"
    command: ["python", "backup.py", "schedule"]
    depends_on:
      skedi-alpha:
        condition: service_healthy
