{% extends "base.html" %}
{% block content %}
  <div class="card" style="max-width:520px">
    <h1>Spremeni geslo</h1>
    {% if g.user['must_change_password'] %}<div class="flash warning">Uporabljaš začasno geslo. Pred nadaljevanjem določi svoje novo geslo.</div>{% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="field"><label>Trenutno geslo</label><input type="password" name="current_password" required maxlength="128" autocomplete="current-password"></div>
      <div class="field"><label>Novo geslo (15–128 znakov)</label><input type="password" name="new_password" required minlength="15" maxlength="128" autocomplete="new-password"></div>
      <div class="field"><label>Ponovi novo geslo</label><input type="password" name="confirm_password" required minlength="15" maxlength="128" autocomplete="new-password"></div>
      <button class="btn btn-primary">Spremeni geslo</button>
    </form>
  </div>
{% endblock %}
