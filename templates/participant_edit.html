{% extends "base.html" %}
{% block content %}<div class="card form-medium"><h1>Uredi prijavo</h1><p>{{ net['title'] }}</p><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="return_to" value="{{ return_to }}"><div class="field"><label>Ime in priimek</label><input name="full_name" value="{{ participant['full_name'] }}" maxlength="120" required></div><div class="field"><label>Klicni znak</label><input name="callsign" value="{{ participant['callsign'] }}" minlength="2" maxlength="24" pattern="[A-Za-z0-9][A-Za-z0-9/-]{0,22}[A-Za-z0-9]" class="callsign-input" required></div><div class="field"><label>Ura prijave</label><input type="time" name="checkin_time" value="{{ participant['checkin_at']|time_si }}" required></div><div class="actions"><button class="btn btn-primary">Shrani</button><a class="btn btn-secondary" href="{{ url_for('edit_net',net_id=net['id']) if return_to=='net_edit' else url_for('net_detail',net_id=net['id']) }}">Prekliči</a></div></form></div>{% endblock %}
